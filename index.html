<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Person Finder</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

<div id="app" class="container mx-auto px-4 py-8">
    
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            AI Person Finder
        </h1>
    </div>

    <div class="max-w-xl mx-auto mb-12">
        <input 
            type="text" 
            v-model="searchQuery" 
            placeholder="İsim veya millet ile ara..." 
            class="w-full px-6 py-4 bg-slate-800 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg text-white"
        >
    </div>

    <div v-if="filteredPeople.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div v-for="person in filteredPeople" :key="person.id" 
             class="bg-slate-800 rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
            
            <div class="relative aspect-[3/4]">
                <img :src="person.image" class="w-full h-full object-cover object-top">
                <div class="absolute top-2 right-2 bg-black/50 backdrop-blur-sm px-2 py-1 rounded text-[10px] font-bold">
                    AI GENERATED
                </div>
            </div>

            <div class="p-5">
                <h3 class="text-xl font-bold mb-3">{{ person.name }} {{ person.surname }}</h3>
                
                <div class="space-y-2 text-sm">
                    <p class="flex justify-between">
                        <span class="text-slate-500">Millet:</span>
                        <span class="text-blue-400 font-semibold">{{ person.nation }}</span>
                    </p>
                    <p class="flex justify-between">
                        <span class="text-slate-500">Yaş:</span>
                        <span class="text-white">{{ person.age }}</span>
                    </p>
                    <p class="flex justify-between">
                        <span class="text-slate-500">Telefon:</span>
                        <span class="text-emerald-400 font-mono">{{ person.phone }}</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div v-else class="text-center text-slate-500 mt-20">
        Kriterlere uygun kimse bulunamadı.
    </div>
</div>

<script>
    // Vue Uygulamasını Başlatıyoruz
    const { createApp } = Vue

    createApp({
        data() {
            return {
                searchQuery: '',
                people: [
                    { 
                        id: 1, 
                        name: 'Lucas', 
                        surname: 'Müller', 
                        nation: 'German', 
                        age: 15, 
                        phone: '+49 151 23456789', 
                        image: '1776969952745.jpg' 
                    },
                    { 
                        id: 2, 
                        name: 'Donaldos', 
                        surname: 'Trhumpius', 
                        nation: 'Mexican', 
                        age: 84, 
                        phone: '+1 212 555 1234', 
                        image: 'pictures/zeynep.jpg' 
                    }
                ]
            }
        },
        computed: {
            filteredPeople() {
                const q = this.searchQuery.toLowerCase().trim();
                return this.people.filter(p => {
                    return p.name.toLowerCase().includes(q) || 
                           p.surname.toLowerCase().includes(q) ||
                           p.nation.toLowerCase().includes(q);
                });
            }
        }
    }).mount('#app')
</script>

</body>
</html>
