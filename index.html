<div v-if="filteredPeople.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <div v-for="person in filteredPeople" :key="person.id" 
             class="group bg-slate-800 rounded-3xl overflow-hidden border border-slate-700 transition-all duration-300 shadow-xl">
            
            <div class="relative aspect-[3/4] overflow-hidden">
                <img :src="person.image" class="w-full h-full object-cover">
                <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold tracking-widest text-white">
                    AI GENERATED
                </div>
            </div>

            <div class="p-5">
                <h3 class="text-2xl font-bold mb-2">{{ person.name }} {{ person.surname }}</h3>
                
                <div class="space-y-2 text-sm text-slate-300">
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 w-16">Millet:</span>
                        <span class="bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded">{{ person.nation }}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 w-16">Yaş:</span>
                        <span class="text-white font-medium">{{ person.age }}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 w-16">Telefon:</span>
                        <span class="text-emerald-400 font-mono">{{ person.phone }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const { createApp } = Vue

    createApp({
        data() {
            return {
                searchQuery: '',
                people: [
                    { 
                        id: 1, 
                        name: 'Lucas', 
                        surname: 'Müller', 
                        nation: 'German🇩🇪', 
                        age: 15, 
                        phone: '+49 152 456 78', 
                        image: '1776969952745.jpg' // GitHub'daki klasör yolun
                    },
                    { 
                        id: 2, 
                        name: 'Zeynep', 
                        surname: 'Aydın', 
                        nation: 'Türk', 
                        age: 24, 
                        phone: '+90 532 123 45', 
                        image: 'pictures/zeynep.jpg' 
                    }
                    // Diğer kişileri de bu formatta ekleyebilirsin
                ]
            }
        },
        computed: {
            filteredPeople() {
                const query = this.searchQuery.toLowerCase().trim();
                return this.people.filter(p => {
                    return p.name.toLowerCase().includes(query) || 
                           p.surname.toLowerCase().includes(query) ||
                           p.nation.toLowerCase().includes(query);
                });
            }
        }
    }).mount('#app')
</script>
