<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Person Finder</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen">

<div id="app" class="container mx-auto px-4 py-12">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            AI Karakter Rehberi
        </h1>
        <p class="text-slate-400 text-lg">Görüşmek istediğiniz yapay zeka kişisini arayın.</p>
    </div>

    <div class="relative max-w-2xl mx-auto mb-16">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="fas fa-search text-slate-500 text-xl"></i>
        </div>
        <input 
            type="text" 
            v-model="searchQuery" 
            placeholder="İsim, soyisim veya millet yazın..." 
            class="w-full pl-12 pr-4 py-4 bg-slate-800 border border-slate-700 rounded-2xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-xl shadow-2xl placeholder-slate-500"
        >
        <div v-if="searchQuery" class="absolute right-4 top-4 text-sm text-slate-400 bg-slate-700 px-3 py-1 rounded-full">
            {{ filteredPeople.length }} sonuç bulundu
        </div>
    </div>

    <div v-if="filteredPeople.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <div v-for="person in filteredPeople" :key="person.id" 
             class="group bg-slate-800 rounded-3xl overflow-hidden border border-slate-700 hover:border-blue-500 transition-all duration-300 hover:shadow-[0_0_30px_rgba(59,130,246,0.2)]">
            
            <div class="relative h-64 overflow-hidden">
                <img :src="person.image" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                <div class="absolute top-3 right-3 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold">
                    AI GENERATED
                </div>
            </div>

            <div class="p-6">
                <h3 class="text-2xl font-bold mb-1">{{ person.name }} {{ person.surname }}</h3>
                <div class="flex items-center text-slate-400 mb-4">
                    <span class="bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded text-sm font-semibold mr-2">{{ person.nation }}</span>
                </div>
                
                <button @click="startCall(person)" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-video"></i>
                    Görüşmeyi Başlat
                </button>
            </div>
        </div>
    </div>

    <div v-else class="text-center py-20">
        <i class="fas fa-user-slash text-6xl text-slate-700 mb-4"></i>
        <p class="text-slate-500 text-xl">Aradığınız kriterlere uygun biri bulunamadı.</p>
    </div>
</div>

<script>
    const { createApp } = Vue

    createApp({
        data() {
            return {
                searchQuery: '',
                // Örnek Veri Seti
                people: [
                    { id: 1, name: 'Arda', surname: 'Öztürk', nation: 'Türk', image: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400' },
                    { id: 2, name: 'Sofia', surname: 'Garcia', nation: 'İspanyol', image: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400' },
                    { id: 3, name: 'Jin', surname: 'Sato', nation: 'Japon', image: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=400' },
                    { id: 4, name: 'Amina', surname: 'Diallo', nation: 'Senegalli', image: 'https://images.unsplash.com/photo-1531123897727-8f129e16fd3c?auto=format&fit=crop&w=400' },
                    { id: 5, name: 'Lucas', surname: 'Müller', nation: 'German🇩🇪', image: '1776969952745.jpg' },
                    { id: 6, name: 'Zeynep', surname: 'Aydın', nation: 'Türk', image: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400' }
                ]
            }
        },
        computed: {
            // Arama algoritması: İsim, soyisim ve milleti kontrol eder
            filteredPeople() {
                const query = this.searchQuery.toLowerCase().trim();
                return this.people.filter(p => {
                    return p.name.toLowerCase().includes(query) || 
                           p.surname.toLowerCase().includes(query) ||
                           p.nation.toLowerCase().includes(query);
                });
            }
        },
        methods: {
            startCall(person) {
                alert(`${person.name} ${person.surname} ile bağlantı kuruluyor...`);
            }
        }
    }).mount('#app')
</script>

</body>
</html>
